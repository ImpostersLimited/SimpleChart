name: Issue Intake

on:
  issues:
    types:
      - opened
      - reopened
      - transferred

permissions:
  contents: read
  issues: write

jobs:
  route-issue:
    runs-on: ubuntu-latest
    env:
      PROJECT_ID: PVT_kwDOBH1sx84BRMRS
      PROJECT_URL: https://github.com/orgs/ImpostersLimited/projects/5
      PROJECT_TOKEN: ${{ secrets.IMPOSTERSLIMITED_PROJECT_AUTOMATION_TOKEN }}
    steps:
      - name: Assign issue to andywkff
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              assignees: ['andywkff'],
            })

      - name: Add issue to ImpostersLimited Main project
        if: ${{ env.PROJECT_TOKEN != '' }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ env.PROJECT_TOKEN }}
          script: |
            const projectId = process.env.PROJECT_ID
            const projectUrl = process.env.PROJECT_URL
            const contentId = context.payload.issue.node_id

            try {
              await github.graphql(
                `mutation($projectId: ID!, $contentId: ID!) {
                  addProjectV2ItemById(input: { projectId: $projectId, contentId: $contentId }) {
                    item {
                      id
                    }
                  }
                }`,
                { projectId, contentId }
              )

              core.info(`Added issue #${context.payload.issue.number} to ${projectUrl}`)
            } catch (error) {
              const message = String(error?.message ?? error)

              if (
                message.includes('already exists') ||
                message.includes('already added') ||
                message.includes('already in the project')
              ) {
                core.info(`Issue #${context.payload.issue.number} is already in ${projectUrl}`)
                return
              }

              core.setFailed(`Failed to add issue #${context.payload.issue.number} to ${projectUrl}: ${message}`)
            }

      - name: Warn when project token is not configured
        if: ${{ env.PROJECT_TOKEN == '' }}
        run: |
          echo "::warning title=Missing project automation token::Set the IMPOSTERSLIMITED_PROJECT_AUTOMATION_TOKEN org secret to enable automatic project placement."